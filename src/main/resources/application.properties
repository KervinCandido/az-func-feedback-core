quarkus.azure-functions.app-name=func-feedback-core
quarkus.azure-functions.runtime.java-version=25
quarkus.http.root-path=api

quarkus.azure.keyvault.secret.endpoint=${QUARKUS_AZURE_KEYVAULT_SECRET_ENDPOINT}

quarkus.swagger-ui.always-include=true

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

mp.openapi.extensions.smallrye.info.title=Feedback Platform API
mp.openapi.extensions.smallrye.info.version=0.1.0-SNAPSHOT
mp.openapi.extensions.smallrye.info.description=API principal da plataforma de feedback do Tech Challenge

app.admin-emails=admin1@empresa.com,admin2@empresa.com

app.outbox.publisher.enabled=true
app.outbox.publisher.interval=10s
app.outbox.publisher.batch-size=10

%test.app.outbox.publisher.enabled=false   # Evitar que o scheduler automático interfira nos testes. Os testes vão chamar o caso de uso diretamente.

%test.quarkus.datasource.db-kind=${QUARKUS_DB_KIND:h2}
quarkus.datasource.db-kind=${QUARKUS_DB_KIND:PostgreSQL}
quarkus.datasource.jdbc.url=${kv//FeedBackDBUrl:jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
quarkus.datasource.username=${kv//FeedbackDBUser:sa}
quarkus.datasource.password=${kv//FeedBackDBPassword:sa}

quarkus.azure.servicebus.namespace=${QUARKUS_AZURE_SERVICEBUS_NAMESPACE:sbns-fiap-feedback-platform}
quarkus.azure.servicebus.connection-string=${kv//ConnectionStringSenderFeedbacksCriticalQueue:}
quarkus.azure.servicebus.queue-name=${QUARKUS_AZURE_SERVICEBUS_QUEUE_NAME:sbq-feedbacks-critical-queue}
