quarkus.http.port=8080

quarkus.swagger-ui.always-include=true

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

mp.openapi.extensions.smallrye.info.title=Feedback Platform API
mp.openapi.extensions.smallrye.info.version=0.1.0-SNAPSHOT
mp.openapi.extensions.smallrye.info.description=API principal da plataforma de feedback do Tech Challenge

app.admin-emails=admin1@empresa.com,admin2@empresa.com

app.outbox.publisher.enabled=true
app.outbox.publisher.interval=10s
app.outbox.publisher.batch-size=10

%test.app.outbox.publisher.enabled=false   # Evitar que o scheduler automático interfira nos testes. Os testes vão chamar o caso de uso diretamente.

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.azure.servicebus.namespace=${QUARKUS_AZURE_SERVICEBUS_NAMESPACE:sbns-fiap-feedback-platform}
quarkus.azure.servicebus.connection-string=${QUARKUS_AZURE_SERVICEBUS_CONNECTION_STRING:}
quarkus.azure.servicebus.queue-name=${QUARKUS_AZURE_SERVICEBUS_QUEUE_NAME:sbq-feedbacks-critical-queue}
